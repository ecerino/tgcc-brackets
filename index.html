<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Fixed 1920-wide layout viewport: the browser scales this to fill the
     screen and rasterizes text at the display's native resolution, so it stays
     crisp on a big/4K TV. A CSS transform/zoom instead upscales a soft bitmap.
     fit() only intervenes for ?overscan or ?fit=stretch. -->
<meta name="viewport" content="width=1920">
<title>2026 Match Play Brackets</title>
<link rel="icon" href="assets/logo.png">
<link rel="stylesheet" href="css/fonts.css">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="fit">
  <div id="viewport">
    <div id="ticker"><div class="ftk-track" id="tktrack"></div></div>
    <div id="tvstage">
      <img class="corner-logo cl-left" src="assets/logo.png" alt="">
      <img class="corner-logo cl-right" src="assets/logo.png" alt="">
      <div id="world"></div>
    </div>
    <div id="timerbar"><div id="timerfill"></div></div>
    <footer id="ftr">
        <span id="fdate"></span>
        <span id="dots"></span>
        <span id="fround"></span>
    </footer>
  </div>
</div>
<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
