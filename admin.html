<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brackets — Admin</title>
<link rel="icon" href="assets/logo.png">
<link rel="stylesheet" href="css/fonts.css">
<link rel="stylesheet" href="css/styles.css">
<style>
  /* admin runs on the same bracket styles, but as a normal scrolling page */
  html, body { overflow: auto; cursor: auto; background: var(--cream); height: auto; }
  body { font-family: 'Inter', system-ui, sans-serif; padding-bottom: 70px; }

  .topbar { background: var(--maroon); color: #fff; padding: 10px 14px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 30; }
  .topbar img { height: 34px; }
  .topbar h1 { font-family: 'Libre Baskerville', serif; font-size: 17px; font-weight: 700; white-space: nowrap; }
  .topbar a { color: #f3e6cf; font-size: 12px; text-decoration: none; font-weight: 600; margin-left: auto; white-space: nowrap; }
  #picker { flex: 1; min-width: 0; padding: 9px 10px; font-size: 14px; font-weight: 600; border: 0; border-radius: 8px; background: #fff; color: var(--ink); font-family: inherit; }

  #gate { max-width: 340px; margin: 70px auto; text-align: center; padding: 0 20px; }
  #gate img { height: 90px; margin-bottom: 14px; }
  #gate h2 { font-family: 'Libre Baskerville', serif; color: var(--maroon); margin-bottom: 16px; }
  #gate input { width: 100%; padding: 13px; font-size: 18px; text-align: center; border: 1.5px solid var(--line); border-radius: 8px; letter-spacing: 3px; }
  #gate button { width: 100%; margin-top: 12px; padding: 13px; font-size: 16px; font-weight: 700; color: #fff; background: var(--maroon); border: 0; border-radius: 8px; cursor: pointer; }
  #gate .err { color: #b00020; font-size: 13px; margin-top: 10px; min-height: 17px; }

  .hint { text-align: center; color: #8b8474; font-size: 13.5px; margin: 10px 14px 2px; font-style: italic; }

  /* the bracket stage: full 1920-wide canvas scaled to the window */
  #stagebox { position: relative; overflow: hidden; margin: 6px auto 0; max-width: 1920px; }
  #stage { position: absolute; top: 0; left: 0; width: 1920px; transform-origin: 0 0; }
  #aworld { position: relative; width: 1920px; height: 1080px; }

  /* tappable names */
  #aworld .slot[data-mid], #aworld .fslot[data-mid] { cursor: pointer; }
  #aworld .slot[data-mid]:hover, #aworld .fslot[data-mid]:hover,
  #aworld .slot[data-mid]:active, #aworld .fslot[data-mid]:active {
    outline: 2.5px solid var(--gold); outline-offset: 1px;
  }

  #toast { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(80px); background: var(--green); color: #fff; padding: 11px 22px; border-radius: 24px; font-size: 14px; font-weight: 600; transition: transform .25s; z-index: 40; box-shadow: 0 4px 14px rgba(0,0,0,.25); font-family: 'Inter', sans-serif; }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.err { background: #b00020; }

  dialog { border: 0; border-radius: 14px; padding: 20px; width: min(92vw, 360px); font-family: 'Inter', system-ui, sans-serif; margin: auto; }
  dialog::backdrop { background: rgba(43,43,40,.5); }
  dialog h3 { font-size: 16px; margin-bottom: 4px; }
  dialog p { font-size: 13px; color: #8b8474; margin-bottom: 12px; }
  dialog input { width: 100%; padding: 12px; font-size: 16px; border: 1.5px solid var(--line); border-radius: 8px; }
  dialog .quick { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
  dialog .quick button { padding: 8px 13px; border: 1.5px solid var(--line); background: #fff; border-radius: 20px; font-size: 13.5px; font-weight: 700; cursor: pointer; }
  dialog .quick button.sel { background: var(--maroon); color: #fff; border-color: var(--maroon); }
  dialog .row { display: flex; gap: 10px; margin-top: 8px; }
  dialog .row button { flex: 1; padding: 12px; font-size: 15px; font-weight: 700; border-radius: 8px; border: 0; cursor: pointer; }
  dialog .row .ok { background: var(--maroon); color: #fff; }
  dialog .row .cancel { background: #eee7d8; color: var(--ink); }
  #dlg-clear { display: block; width: 100%; margin-top: 12px; padding: 10px; background: none; border: 0; font-size: 12.5px; font-weight: 700; color: #b00020; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
  #dlg-clear[hidden] { display: none; }
</style>
</head>
<body>
<div class="topbar">
  <img src="assets/logo.png" alt="">
  <h1>Brackets Admin</h1>
  <select id="picker" hidden></select>
  <a href="index.html" target="_blank">View board &rarr;</a>
</div>

<div id="gate">
  <img src="assets/logo.png" alt="">
  <h2>Enter Admin PIN</h2>
  <input id="pin" type="password" inputmode="text" autocomplete="off" placeholder="PIN">
  <button id="login">Unlock</button>
  <div class="err" id="gate-err"></div>
</div>

<main id="app" hidden>
  <p class="hint">Tap a name to record that win and enter the score. Tap either player again to change or clear it.</p>
  <div id="stagebox"><div id="stage"><div id="aworld"></div></div></div>
</main>

<dialog id="scoredlg">
  <h3 id="dlg-title"></h3>
  <p>Optional — final margin (match play)</p>
  <div class="quick" id="quick"></div>
  <input id="score" placeholder="Custom, e.g. 3&amp;2, 1 UP, 20 holes">
  <div class="row">
    <button class="cancel" id="dlg-cancel">Cancel</button>
    <button class="ok" id="dlg-ok">Save winner</button>
  </div>
  <button id="dlg-clear" hidden>Clear this result</button>
</dialog>

<div id="toast"></div>

<script>window.ADMIN_MODE = true;</script>
<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
