<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brackets — Admin</title>
<link rel="icon" href="assets/logo.png">
<link rel="stylesheet" href="css/fonts.css">
<link rel="stylesheet" href="css/styles.css">
<style>
  /* ── modern app skin: flat, white, Inter — overrides the TV styles ── */
  html, body { overflow: auto; cursor: auto; background: #f6f6f4; height: auto; }
  body { font-family: 'Inter', system-ui, sans-serif; padding-bottom: 70px; color: #111827; }

  .topbar { background: #fff; color: #111827; border-bottom: 1px solid #e7e5e0; padding: 10px 16px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 30; }
  .topbar img { height: 32px; }
  .topbar h1 { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: -0.2px; white-space: nowrap; }
  .topbar a { margin-left: auto; color: var(--maroon); font-size: 13px; font-weight: 600; text-decoration: none; white-space: nowrap; }
  #picker { flex: 1; min-width: 0; padding: 9px 12px; font-size: 14px; font-weight: 600; border: 1px solid #e7e5e0; border-radius: 10px; background: #f9f9f7; color: #111827; font-family: inherit; }

  #gate { max-width: 360px; margin: 72px auto; background: #fff; border: 1px solid #e7e5e0; border-radius: 16px; padding: 32px 28px; text-align: center; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
  #gate img { height: 72px; margin-bottom: 14px; }
  #gate h2 { font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 700; color: #111827; margin-bottom: 16px; }
  #gate input { width: 100%; padding: 12px; font-size: 17px; text-align: center; border: 1px solid #d8d5ce; border-radius: 10px; letter-spacing: 3px; background: #fafaf8; }
  #gate button { width: 100%; margin-top: 12px; padding: 13px; font-size: 15px; font-weight: 700; color: #fff; background: var(--maroon); border: 0; border-radius: 10px; cursor: pointer; }
  #gate .err { color: #b00020; font-size: 13px; margin-top: 10px; min-height: 17px; }

  .hint { color: #6b7280; font-size: 13px; margin: 12px 16px 2px; }

  /* bracket card */
  #stagebox { position: relative; overflow: hidden; margin: 10px 12px 0; background: #fff; border: 1px solid #e7e5e0; border-radius: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
  #stage { position: absolute; top: 0; left: 0; width: 1920px; transform-origin: 0 0; }
  #aworld { position: relative; width: 1920px; height: 1080px; background: #fff; }

  /* ── flatten the TV bracket styling inside the admin card ── */
  #aworld .crest-wm { display: none; }
  #aworld .hdr h1 { font-family: 'Inter', sans-serif; font-size: 32px; font-weight: 800; letter-spacing: -0.4px; color: #111827; }
  #aworld .hdr h1::after { display: none; }
  #aworld .hdr .sub.flight { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 2.5px; color: #6b7280; }
  #aworld .colhead { font-family: 'Inter', sans-serif; font-weight: 700; letter-spacing: 1.2px; color: #374151; }
  #aworld .colhead small { font-family: 'Inter', sans-serif; font-weight: 500; letter-spacing: 0.8px; color: #9ca3af; }
  #aworld .wires path { stroke: #d9d7d0; }
  #aworld .wires path.hot { stroke: var(--maroon); opacity: 0.45; }
  #aworld .wires path.qdivider { stroke: #e7e5e0; }
  #aworld .slot { font-family: 'Inter', sans-serif; font-weight: 600; letter-spacing: 0; border: 1px solid #e2e0da; border-radius: 7px; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
  #aworld .slot.won { background: var(--maroon); border-color: var(--maroon); color: #fff; box-shadow: none; }
  #aworld .slot.lost { background: #f4f4f2; color: #9ca3af; border-color: #e7e5e0; }
  #aworld .slot.empty, #aworld .slot.await { border: 1.5px dashed #ddDBd4; background: #fbfbfa; box-shadow: none; }
  #aworld .advtag { font-family: 'Inter', sans-serif; font-weight: 700; letter-spacing: 0.4px; color: #6b7280; }
  #aworld .center .fslot, #aworld .champwrap .champbox { font-family: 'Inter', sans-serif; font-weight: 600; border: 1px solid #e2e0da; border-radius: 9px; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
  #aworld .center .fslot.won, #aworld .champwrap .champbox.won { background: var(--maroon); border-color: var(--maroon); color: #fff; box-shadow: none; }
  #aworld .center .fslot.empty, #aworld .champwrap .champbox.empty { border-style: dashed; background: #fbfbfa; box-shadow: none; }
  #aworld .center .vs { font-family: 'Inter', sans-serif; color: #9ca3af; }
  #aworld .champwrap .champlbl { font-family: 'Inter', sans-serif; font-weight: 700; letter-spacing: 1.6px; color: #6b7280; }
  #aworld .champwrap .fadv, #aworld .band .fadv { font-family: 'Inter', sans-serif; color: #6b7280; }

  /* tappable names */
  #aworld .slot[data-mid], #aworld .fslot[data-mid] { cursor: pointer; }
  #aworld .slot[data-mid]:hover, #aworld .fslot[data-mid]:hover,
  #aworld .slot[data-mid]:active, #aworld .fslot[data-mid]:active {
    outline: 2px solid var(--maroon); outline-offset: 1.5px;
  }

  #toast { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(80px); background: #111827; color: #fff; padding: 11px 22px; border-radius: 12px; font-size: 14px; font-weight: 600; transition: transform .25s; z-index: 40; box-shadow: 0 6px 20px rgba(0,0,0,.25); font-family: 'Inter', sans-serif; }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.err { background: #b00020; }

  dialog { border: 0; border-radius: 16px; padding: 22px; width: min(92vw, 360px); font-family: 'Inter', system-ui, sans-serif; margin: auto; box-shadow: 0 20px 50px rgba(0,0,0,.25); }
  dialog::backdrop { background: rgba(17,24,39,.45); }
  dialog h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; color: #111827; }
  dialog p { font-size: 13px; color: #6b7280; margin-bottom: 14px; }
  dialog input { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #d8d5ce; border-radius: 10px; background: #fafaf8; }
  dialog .row { display: flex; gap: 10px; margin-top: 14px; }
  dialog .row button { flex: 1; padding: 12px; font-size: 15px; font-weight: 700; border-radius: 10px; border: 0; cursor: pointer; }
  dialog .row .ok { background: var(--maroon); color: #fff; }
  dialog .row .cancel { background: #f0efec; color: #111827; }
  #dlg-clear { display: block; width: 100%; margin-top: 12px; padding: 10px; background: none; border: 0; font-size: 12.5px; font-weight: 700; color: #b00020; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
  #dlg-clear[hidden] { display: none; }
</style>
</head>
<body>
<div class="topbar">
  <img src="assets/logo.png" alt="">
  <h1>Brackets Admin</h1>
  <select id="picker" hidden></select>
  <a href="index.html" target="_blank">View board &rarr;</a>
</div>

<div id="gate">
  <img src="assets/logo.png" alt="">
  <h2>Enter Admin PIN</h2>
  <input id="pin" type="password" inputmode="text" autocomplete="off" placeholder="PIN">
  <button id="login">Unlock</button>
  <div class="err" id="gate-err"></div>
</div>

<main id="app" hidden>
  <p class="hint">Tap a name to record that win and enter the score. Tap either player again to change or clear it.</p>
  <div id="stagebox"><div id="stage"><div id="aworld"></div></div></div>
</main>

<dialog id="scoredlg">
  <h3 id="dlg-title"></h3>
  <p>Optional — final margin (match play)</p>
  <input id="score" placeholder="e.g. 3&amp;2, 1 UP, 20 holes">
  <div class="row">
    <button class="cancel" id="dlg-cancel">Cancel</button>
    <button class="ok" id="dlg-ok">Save winner</button>
  </div>
  <button id="dlg-clear" hidden>Clear this result</button>
</dialog>

<div id="toast"></div>

<script>window.ADMIN_MODE = true;</script>
<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
