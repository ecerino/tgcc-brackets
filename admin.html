<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Brackets — Admin</title>
<link rel="icon" href="assets/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --maroon:#8e1b26; --maroon-dark:#6f141d; --green:#2c3e33;
    --gold:#c29a3b; --cream:#faf7ef; --ink:#2b2b28; --line:#d8d1c2;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Inter',system-ui,sans-serif; background:var(--cream); color:var(--ink); padding-bottom:80px; }
  header { background:var(--maroon); color:#fff; padding:14px 16px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:10; }
  header img { height:38px; }
  header h1 { font-family:'Playfair Display',serif; font-size:19px; font-weight:700; flex:1; }
  header a { color:#f3e6cf; font-size:12px; text-decoration:none; font-weight:600; }

  #gate { max-width:340px; margin:70px auto; text-align:center; padding:0 20px; }
  #gate img { height:90px; margin-bottom:14px; }
  #gate h2 { font-family:'Playfair Display',serif; color:var(--maroon); margin-bottom:16px; }
  #gate input { width:100%; padding:13px; font-size:18px; text-align:center; border:1.5px solid var(--line); border-radius:8px; letter-spacing:3px; }
  #gate button { width:100%; margin-top:12px; padding:13px; font-size:16px; font-weight:700; color:#fff; background:var(--maroon); border:0; border-radius:8px; }
  #gate .err { color:#b00020; font-size:13px; margin-top:10px; min-height:17px; }

  main { max-width:560px; margin:0 auto; padding:14px; }
  #picker { width:100%; padding:12px; font-size:15px; font-weight:600; border:1.5px solid var(--line); border-radius:10px; background:#fff; color:var(--ink); }
  .note { text-align:center; color:#8b8474; font-size:14px; margin:26px 0 6px; font-style:italic; }
  .roundhdr { margin:20px 4px 8px; font-size:12px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:var(--maroon); display:flex; justify-content:space-between; }
  .roundhdr small { color:#8b8474; letter-spacing:1px; font-weight:600; }
  .match { background:#fff; border:1px solid var(--line); border-radius:10px; margin-bottom:10px; overflow:hidden; box-shadow:0 1px 3px rgba(43,43,40,.06); }
  .match .mid { font-size:10px; color:#a49d8f; padding:6px 12px 0; font-weight:700; letter-spacing:1px; }
  .teams { display:flex; flex-direction:column; }
  .tbtn { display:flex; align-items:center; justify-content:space-between; padding:13px 14px; font-size:15.5px; font-weight:600; border:0; background:#fff; text-align:left; border-top:1px solid #f0ebdf; width:100%; color:var(--ink); }
  .tbtn:first-child { border-top:0; }
  .tbtn:disabled { color:#b9b2a4; font-style:italic; }
  .tbtn.winner { background:var(--maroon); color:#fff; }
  .tbtn.winner .score { color:#ecd28d; }
  .tbtn .score { font-size:13px; font-weight:800; color:var(--gold); }
  .tools { display:flex; justify-content:flex-end; gap:14px; padding:7px 12px; background:#faf7ef; border-top:1px solid #f0ebdf; }
  .tools button { background:none; border:0; font-size:12px; font-weight:700; color:#8b8474; text-transform:uppercase; letter-spacing:1px; }
  .tools button.danger { color:#b00020; }

  #toast { position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(80px); background:var(--green); color:#fff; padding:11px 22px; border-radius:24px; font-size:14px; font-weight:600; transition:transform .25s; z-index:20; box-shadow:0 4px 14px rgba(0,0,0,.25); }
  #toast.show { transform:translateX(-50%) translateY(0); }
  #toast.err { background:#b00020; }

  dialog { border:0; border-radius:14px; padding:20px; width:min(92vw,360px); }
  dialog::backdrop { background:rgba(43,43,40,.5); }
  dialog h3 { font-size:16px; margin-bottom:4px; }
  dialog p { font-size:13px; color:#8b8474; margin-bottom:12px; }
  dialog input { width:100%; padding:12px; font-size:16px; border:1.5px solid var(--line); border-radius:8px; }
  dialog .quick { display:flex; flex-wrap:wrap; gap:8px; margin:12px 0; }
  dialog .quick button { padding:8px 13px; border:1.5px solid var(--line); background:#fff; border-radius:20px; font-size:13.5px; font-weight:700; }
  dialog .quick button.sel { background:var(--maroon); color:#fff; border-color:var(--maroon); }
  dialog .row { display:flex; gap:10px; margin-top:8px; }
  dialog .row button { flex:1; padding:12px; font-size:15px; font-weight:700; border-radius:8px; border:0; }
  dialog .row .ok { background:var(--maroon); color:#fff; }
  dialog .row .cancel { background:#eee7d8; color:var(--ink); }
</style>
</head>
<body>
<header>
  <img src="assets/logo.png" alt="">
  <h1>Brackets Admin</h1>
  <a href="index.html" target="_blank">View board &rarr;</a>
</header>

<div id="gate">
  <img src="assets/logo.png" alt="">
  <h2>Enter Admin PIN</h2>
  <input id="pin" type="password" inputmode="text" autocomplete="off" placeholder="PIN">
  <button id="login">Unlock</button>
  <div class="err" id="gate-err"></div>
</div>

<main id="app" hidden>
  <select id="picker"></select>
  <div id="list"></div>
</main>

<dialog id="scoredlg">
  <h3 id="dlg-title"></h3>
  <p>Optional — final margin (match play)</p>
  <div class="quick" id="quick"></div>
  <input id="score" placeholder="Custom, e.g. 3&amp;2, 1 UP, 20 holes">
  <div class="row">
    <button class="cancel" id="dlg-cancel">Cancel</button>
    <button class="ok" id="dlg-ok">Save winner</button>
  </div>
</dialog>

<div id="toast"></div>

<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
